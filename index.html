<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroMonitor - Sistema de Passagens Aéreas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .airplane-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: left;
        }
        
        .status-title {
            color: #4caf50;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .status p {
            margin: 5px 0;
            color: #555;
        }
        
        .btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px 5px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        .github-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .github-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .github-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="airplane-icon">✈️</div>
        <h1>AeroMonitor</h1>
        <p><strong>Sistema de Passagens Aéreas</strong></p>
        
        <div class="status">
            <div class="status-title">✅ Aplicação Online</div>
            <p>Seu aplicativo AeroMonitor está funcionando corretamente!</p>
            <p>A página foi publicada via GitHub Pages.</p>
        </div>
        
        <p>Bem-vindo ao AeroMonitor - a solução completa para gerenciamento de passagens aéreas.</p>
        
        <div class="github-link">
            <p>📁 <a href="https://github.com/joaobolado16284602-rgb/AeroMonitor" target="_blank">Ver repositório no GitHub</a></p>
        </div>
    </div>
</body>
</html>
